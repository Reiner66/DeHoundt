<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D'Hondt Pro - Los-Check</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --win: #dcfce7; --tie: #fef08a; --tie-border: #facc15; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); width: 100%; max-width: 100%; overflow: hidden; }
        h2 { font-size: 1.2rem; text-align: center; margin: 0 0 15px 0; }
        .settings { background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .input-field { display: flex; flex-direction: column; width: 100%; }
        label { font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 16px; width: 100%; }
        .liste-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .index-label { min-width: 25px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .n-in { flex: 1.5; min-width: 0; }
        .s-in { flex: 1; min-width: 0; }
        button { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; margin: 10px 0; }
        .scroll-container { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f8fafc; white-space: nowrap; }
        .winner-cell { background: var(--win); font-weight: bold; }
        .tie-cell { background: var(--tie); font-weight: bold; border: 2px solid var(--tie-border) !important; }
        .alert-box { background: #fff7ed; color: #9a3412; padding: 12px; border-radius: 8px; border: 1px solid var(--tie-border); margin: 15px 0; font-size: 0.85rem; }
        @media (min-width: 480px) { .settings { flex-direction: row; } }
    </style>
</head>
<body>

<div class="container">
    <h2>🗳️ D'Hondt Rechner</h2>
    <div class="settings">
        <div class="input-field"><label>Listen</label><input type="number" id="anzahlListen" value="3" min="1" oninput="updateRows()"></div>
        <div class="input-field"><label>Sitze</label><input type="number" id="sitzeGesamt" value="5" min="1"></div>
    </div>
    <div id="listen-container"></div>
    <button onclick="berechnen()">Ergebnis berechnen</button>
    <div id="ergebnis-bereich"></div>
</div>

<script>
function updateRows() {
    const container = document.getElementById('listen-container');
    const anzahl = parseInt(document.getElementById('anzahlListen').value) || 0;
    const inputs = container.querySelectorAll('.liste-row');
    const backup = Array.from(inputs).map(row => ({ name: row.querySelector('.n-in').value, stim: row.querySelector('.s-in').value }));
    container.innerHTML = '';
    for (let i = 0; i < anzahl; i++) {
        const row = document.createElement('div');
        row.className = 'liste-row';
        row.innerHTML = `<div class="index-label">${i+1}</div><input type="text" class="n-in" value="${backup[i]?backup[i].name:'L'+(i+1)}"><input type="number" class="s-in" value="${backup[i]?backup[i].stim:''}" placeholder="Stimmen" inputmode="numeric">`;
        container.appendChild(row);
    }
}

function berechnen() {
    const sitzeGesamt = parseInt(document.getElementById('sitzeGesamt').value);
    const nInputs = document.querySelectorAll('.n-in'), sInputs = document.querySelectorAll('.s-in');
    let parteien = [], alleQuotienten = [];

    for (let i = 0; i < nInputs.length; i++) {
        const s = parseInt(sInputs[i].value) || 0;
        let p = { name: nInputs[i].value, stimmen: s, sitze: 0, quotienten: [] };
        for (let t = 1; t <= sitzeGesamt; t++) { let q = s / t; p.quotienten.push(q); alleQuotienten.push(q); }
        parteien.push(p);
    }

    alleQuotienten.sort((a, b) => b - a);
    const huerde = alleQuotienten[sitzeGesamt - 1] || 0;
    let vergebeneSitze = 0;
    
    // Zähle sichere Sitze (strikt größer als Hürde)
    parteien.forEach(p => { p.quotienten.forEach(q => { if (q > huerde && vergebeneSitze < sitzeGesamt) { p.sitze++; vergebeneSitze++; } }); });

    const anzahlHuerdeGesamt = alleQuotienten.filter(q => q === huerde && q > 0).length;
    let freieSitzeAnDerHuerde = sitzeGesamt - vergebeneSitze;
    let mussLosen = huerde > 0 && anzahlHuerdeGesamt > freieSitzeAnDerHuerde;

    let html = `<h3>📊 Ergebnis</h3><div class="scroll-container"><table><tr><th>Liste</th><th>Stimmen</th><th>Sitze</th></tr>`;
    
    // Für die Anzeige: restliche Sitze an der Hürde "auffüllen" (nur Visualisierung)
    let tempParteien = JSON.parse(JSON.stringify(parteien));
    let tempVergeben = vergebeneSitze;
    tempParteien.forEach(p => { p.quotienten.forEach(q => { if (q === huerde && tempVergeben < sitzeGesamt && q > 0) { p.sitze++; tempVergeben++; } }); });

    tempParteien.forEach(p => {
        let losInfo = (mussLosen && p.quotienten.includes(huerde)) ? " <small>(Los?)</small>" : "";
        html += `<tr><td>${p.name}${losInfo}</td><td>${p.stimmen.toLocaleString()}</td><td><strong>${p.sitze}</strong></td></tr>`;
    });
    html += `</table></div>`;

    if (mussLosen) {
        let betroffene = parteien.filter(p => p.quotienten.includes(huerde)).map(p => p.name);
        html += `<div class="alert-box"><strong>⚠️ LOSENTSCHEID ERFORDERLICH</strong><br>Gleichstand bei Wert <b>${huerde.toLocaleString(undefined,{minimumFractionDigits:2})}</b>.<br>Zwischen: ${betroffene.join(', ')}</div>`;
    }

    html += `<h3>🔢 Matrix</h3><div class="scroll-container"><table><tr><th>Teiler</th>`;
    parteien.forEach(p => html += `<th>${p.name}</th>`);
    html += `</tr>`;
    for (let t = 0; t < Math.min(sitzeGesamt, 15); t++) {
        html += `<tr><td><strong>:${t+1}</strong></td>`;
        parteien.forEach(p => {
            const q = p.quotienten[t];
            let styleClass = "";
            if (q > 0) {
                if (q > huerde) styleClass = "winner-cell";
                else if (q === huerde) styleClass = mussLosen ? "tie-cell" : "winner-cell";
            }
            html += `<td class="${styleClass}">${q.toLocaleString(undefined,{minimumFractionDigits:1, maximumFractionDigits:1})}</td>`;
        });
        html += `</tr>`;
    }
    html += `</table></div>`;
    document.getElementById('ergebnis-bereich').innerHTML = html;
}
updateRows();
</script>
</body>
</html>
