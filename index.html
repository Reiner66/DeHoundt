<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>D'Hondt Pro</title>
    
    <!-- PWA Manifest direkt eingebettet -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22DHondt%20Rechner%22,%22short_name%22:%22DHondt%22,%22start_url%22:%22index.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f8fafc%22,%22theme_color%22:%22%232563eb%22}">

    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --win: #dcfce7; --accent: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 10px 10px 10px; display: flex; justify-content: center; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 800px; box-sizing: border-box; }
        .settings { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 8px; }
        .input-field { display: flex; flex-direction: column; flex: 1; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; -webkit-appearance: none; }
        .liste-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .index-label { min-width: 30px; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 6px; font-weight: bold; }
        .n-in { flex: 2; } .s-in { flex: 1; }
        button { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; margin: 15px 0; -webkit-appearance: none; }
        .scroll-container { width: 100%; overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; font-size: 0.8rem; text-transform: uppercase; }
        .winner-cell { background: var(--win); font-weight: bold; }
        .alert-box { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 8px; border: 1px solid var(--accent); margin: 20px 0; font-size: 0.9rem; }
        @media (min-width: 600px) { .settings { flex-direction: row; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-top:0;">🗳️ D'Hondt Pro WebApp</h2>
    
    <div class="settings">
        <div class="input-field">
            <label>Anzahl Listen</label>
            <input type="number" id="anzahlListen" value="3" min="1" oninput="updateRows()">
        </div>
        <div class="input-field">
            <label>Sitze gesamt</label>
            <input type="number" id="sitzeGesamt" value="5" min="1">
        </div>
    </div>

    <div id="listen-container"></div>
    <button onclick="berechnen()">Ergebnis berechnen</button>
    <div id="ergebnis-bereich"></div>
</div>

<script>
function updateRows() {
    const container = document.getElementById('listen-container');
    const anzahl = parseInt(document.getElementById('anzahlListen').value) || 0;
    const inputs = container.querySelectorAll('.liste-row');
    const backup = Array.from(inputs).map(row => ({ 
        name: row.querySelector('.n-in').value, stim: row.querySelector('.s-in').value 
    }));

    container.innerHTML = '';
    for (let i = 0; i < anzahl; i++) {
        const row = document.createElement('div');
        row.className = 'liste-row';
        row.innerHTML = `
            <div class="index-label">${i + 1}</div>
            <input type="text" class="n-in" value="${backup[i] ? backup[i].name : 'Liste ' + (i+1)}">
            <input type="number" class="s-in" value="${backup[i] ? backup[i].stim : ''}" placeholder="Stimmen" inputmode="numeric">
        `;
        container.appendChild(row);
    }
}

function berechnen() {
    const sitzeGesamt = parseInt(document.getElementById('sitzeGesamt').value);
    const nInputs = document.querySelectorAll('.n-in');
    const sInputs = document.querySelectorAll('.s-in');
    let parteien = [];
    let alleQuotienten = [];

    for (let i = 0; i < nInputs.length; i++) {
        const s = parseInt(sInputs[i].value) || 0;
        let p = { name: nInputs[i].value, stimmen: s, sitze: 0, quotienten: [] };
        for (let t = 1; t <= sitzeGesamt; t++) {
            let q = s / t;
            p.quotienten.push(q);
            alleQuotienten.push(q);
        }
        parteien.push(p);
    }

    alleQuotienten.sort((a, b) => b - a);
    const huerde = alleQuotienten[sitzeGesamt - 1];
    let vergebeneSitze = 0;

    parteien.forEach(p => {
        p.quotienten.forEach(q => { if (q > huerde && vergebeneSitze < sitzeGesamt) { p.sitze++; vergebeneSitze++; } });
    });

    const anzahlHuerdeGesamt = alleQuotienten.filter(q => q === huerde).length;
    let freieSitzeAnDerHuerde = sitzeGesamt - vergebeneSitze;
    let losHinweis = "";
    if (anzahlHuerdeGesamt > freieSitzeAnDerHuerde) {
        let betroffene = parteien.filter(p => p.quotienten.includes(huerde)).map(p => p.name);
        losHinweis = `<div class="alert-box"><strong>⚠️ LOSENTSCHEID (§15 Abs.2 WO)</strong><br>Gleichstand bei Höchstzahl ${huerde.toLocaleString(undefined,{minimumFractionDigits:2})}.<br>Listen: ${betroffene.join(', ')}</div>`;
    }

    parteien.forEach(p => {
        p.quotienten.forEach(q => { if (q === huerde && vergebeneSitze < sitzeGesamt) { p.sitze++; vergebeneSitze++; } });
    });

    let html = `<h3>📊 Sitzverteilung</h3><div class="scroll-container"><table><tr><th>Liste</th><th>Stimmen</th><th>Sitze</th></tr>`;
    parteien.forEach(p => { html += `<tr><td>${p.name}</td><td>${p.stimmen.toLocaleString()}</td><td><strong>${p.sitze}</strong></td></tr>`; });
    html += `</table></div>` + losHinweis;

    html += `<h3>🔢 Matrix</h3><div class="scroll-container"><table><tr><th>Teiler</th>`;
    parteien.forEach(p => html += `<th>${p.name}</th>`);
    html += `</tr>`;
    for (let t = 0; t < Math.min(sitzeGesamt, 15); t++) {
        html += `<tr><td><strong>:${t+1}</strong></td>`;
        parteien.forEach(p => {
            const q = p.quotienten[t];
            const isWinner = q >= huerde && (p.sitze > t);
            html += `<td class="${isWinner ? 'winner-cell' : ''}">${q.toLocaleString(undefined,{minimumFractionDigits:2})}</td>`;
        });
        html += `</tr>`;
    }
    html += `</table></div>`;
    document.getElementById('ergebnis-bereich').innerHTML = html;
    document.getElementById('ergebnis-bereich').scrollIntoView({ behavior: 'smooth' });
}
updateRows();
</script>
</body>
</html>
